<!doctype html><html><head><meta charset=utf-8>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>PrismAI · spend</title>
<style>
:root{color-scheme:light dark}
body{font:14px/1.5 system-ui,-apple-system,sans-serif;margin:0;padding:2rem;max-width:820px;margin:auto}
h1{font-size:1.5rem;margin:.2rem 0 .1rem}
.sub{color:#888;margin-bottom:1.3rem}
.bar{display:flex;gap:.6rem;align-items:center;margin-bottom:1.4rem}
input,button{font:inherit;padding:.35rem .6rem;border:1px solid #8884;border-radius:8px;background:transparent;color:inherit}
button{cursor:pointer}
h3{margin:1.4rem 0 .4rem;font-size:.95rem;text-transform:uppercase;letter-spacing:.04em;color:#888}
table{border-collapse:collapse;width:100%}
td,th{padding:.45rem .7rem;text-align:right;border-bottom:1px solid #8882}
td:first-child,th:first-child{text-align:left}
th{font-weight:600;color:#888;font-size:.8rem}
.usd{font-variant-numeric:tabular-nums;font-weight:600}
.tot{font-size:2rem;font-weight:700}
.err{padding:2rem;text-align:center;color:#c33}
</style></head><body>
<div id=app><p class=sub>Loading…</p></div>
<script>
const $=h=>{const d=document.createElement('div');d.innerHTML=h;return d.firstChild};
const token=localStorage.getItem('token');
function fmt(n){return n.toLocaleString()}
function tbl(title,obj,money){
  const rows=Object.entries(obj||{}).sort((a,b)=>b[1].usd-a[1].usd);
  if(!rows.length)return '';
  let h=`<h3>${title}</h3><table><tr><th></th><th>calls</th><th>in</th><th>out</th><th>$</th></tr>`;
  for(const [k,b] of rows)
    h+=`<tr><td>${k}</td><td>${fmt(b.calls)}</td><td>${fmt(b.in)}</td><td>${fmt(b.out)}</td><td class=usd>$${b.usd.toFixed(3)}</td></tr>`;
  return h+'</table>';
}
function ctbl(title,obj){
  const rows=Object.entries(obj||{}).sort((a,b)=>b[1].usd-a[1].usd);
  if(!rows.length)return '';
  let h=`<h3>${title}</h3><table><tr><th></th><th>$</th></tr>`;
  for(const [k,b] of rows) h+=`<tr><td>${k}</td><td class=usd>$${(b.usd||0).toFixed(2)}</td></tr>`;
  return h+'</table>';
}
async function loadFireworks(period){
  try{
    const r=await fetch('/usage/fireworks?period='+encodeURIComponent(period||''),{headers:{Authorization:'Bearer '+token}});
    if(!r.ok)return;
    const f=await r.json();
    const app=document.getElementById('app');
    app.append($(`<h1 style="margin-top:2.5rem">⚡ $${(f.total_usd||0).toFixed(2)} <span class=sub style="font-size:1rem;font-weight:400">· Fireworks actual bill</span></h1>`));
    app.append($(`<div class=sub>real rated dollars from Fireworks (cache-adjusted) · channels = API keys${f.error?(' · error: '+f.error):''}</div>`));
    app.append($('<div>'+ctbl('By channel (API key)',f.by_channel)+ctbl('By model',f.by_model)+'</div>'));
  }catch(e){}
}
function periodOptions(){
  var d=new Date(), o=[];
  for(var i=0;i<3;i++){var m=new Date(d.getFullYear(),d.getMonth()-i,1);
    o.push({v:m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0'),
            t:m.toLocaleString(undefined,{month:'long',year:'numeric'})});}
  o.push({v:'last3',t:'Last 3 months'}); o.push({v:'all',t:'All time'});
  return o;
}
function buildBar(cur){
  var bar=$('<div class=bar></div>'), sel=document.createElement('select');
  periodOptions().forEach(function(o){var e=document.createElement('option');e.value=o.v;e.textContent=o.t;if(o.v===cur)e.selected=true;sel.appendChild(e);});
  sel.onchange=function(){load(sel.value);};
  bar.append('Period ',sel); return bar;
}
async function load(period){
  const app=document.getElementById('app');
  if(!token){app.innerHTML='<div class=err>Open this from inside PrismAI (no session token found).</div>';return;}
  const r=await fetch('/usage/summary?period='+encodeURIComponent(period||''),{headers:{Authorization:'Bearer '+token}});
  if(r.status===403){app.innerHTML='<div class=err>🔒 Admins only.</div>';return;}
  if(!r.ok){app.innerHTML='<div class=err>Error '+r.status+'</div>';return;}
  const s=await r.json();
  app.innerHTML='';
  app.append($(`<h1>💰 $${(s.total_usd||0).toFixed(2)} <span class=sub style="font-size:1rem;font-weight:400">· ${s.period}</span></h1>`));
  app.append($(`<div class=sub>${fmt(s.calls||0)} model calls · prices are configurable estimates</div>`));
  app.append(buildBar(period||CUR));
  const timeTbl = s.multi_month ? tbl('By month',s.by_month) : tbl('By day',s.by_day);
  app.append($('<h2 style="margin-top:.5rem;font-size:1rem;color:#888">PrismAI metered (this server)</h2>'));
  app.append($('<div>'+tbl('By user',s.by_user)+tbl('By model',s.by_model)+tbl('By job',s.by_label)+timeTbl+'</div>'));
  loadFireworks(period||CUR);   // append the actual Fireworks-bill section (all channels)
}
var CUR=periodOptions()[0].v;
load(CUR);
</script></body></html>
